# ============================================================================
# Documentation Stack - Docker Compose
# ============================================================================
# Standort: Hetzner CX33 VPS (4 vCPU, 8 GB RAM, 80 GB SSD)
# Pfad auf Server: /opt/containers/novabrands-mgmt/docker-compose.yml
#
# Services: Traefik, OpenProject, Nextcloud, Collabora
# Datenbanken: 2x PostgreSQL 18, 1x Redis 7, 1x Memcached
#
# NETZWERKE:
# - proxy:                Traefik -> oeffentliche Services
# - socket-proxy:         Traefik <-> Docker Socket Proxy (read-only)
# - openproject-backend:  OpenProject <-> PostgreSQL, Memcached
# - nextcloud-backend:    Nextcloud <-> PostgreSQL, Redis
# ============================================================================

services:
  # =========================================================================
  # DOCKER SOCKET PROXY
  # =========================================================================
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: socket-proxy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      CONTAINERS: 1
      NETWORKS: 1
      SERVICES: 0
      TASKS: 0
      INFO: 0
      POST: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - socket-proxy
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

  # =========================================================================
  # TRAEFIK - Reverse Proxy & SSL
  # =========================================================================
  traefik:
    image: traefik:v3.6.9
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN}
    depends_on:
      - socket-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - /opt/containers/traefik/certs:/etc/traefik/certs
      - /var/log/traefik:/var/log/traefik
    networks:
      - proxy
      - socket-proxy
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    labels:
      - "traefik.enable=true"
      # Dashboard
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=auth,security-headers,rate-limit"
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"
      # Security Headers (global middleware)
      - "traefik.http.middlewares.security-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.security-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.security-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.security-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.security-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      # Rate Limiting (global middleware)
      - "traefik.http.middlewares.rate-limit.ratelimit.average=200"
      - "traefik.http.middlewares.rate-limit.ratelimit.burst=400"
      - "traefik.http.middlewares.rate-limit.ratelimit.period=1m"

  # =========================================================================
  # OPENPROJECT
  # =========================================================================
  openproject:
    image: openproject/openproject:17.2.1
    container_name: openproject
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      OPENPROJECT_HOST__NAME: ${OP_HOSTNAME}
      OPENPROJECT_HTTPS: "true"
      OPENPROJECT_HSTS: "true"
      OPENPROJECT_DEFAULT__LANGUAGE: de
      OPENPROJECT_RAILS__CACHE__STORE: memcache
      OPENPROJECT_CACHE__MEMCACHE__SERVER: openproject-cache:11211
      OPENPROJECT_CACHE__NAMESPACE: openproject
      DATABASE_URL: "postgres://${OP_DB_USER}:${OP_DB_PASSWORD}@openproject-db/${OP_DB_NAME}"
      SECRET_KEY_BASE: ${OP_SECRET_KEY_BASE}
      RAILS_MIN_THREADS: ${OP_RAILS_MIN_THREADS:-4}
      RAILS_MAX_THREADS: ${OP_RAILS_MAX_THREADS:-16}
      OPENPROJECT_EMAIL__DELIVERY__METHOD: smtp
      OPENPROJECT_SMTP__ADDRESS: ${SMTP_HOST}
      OPENPROJECT_SMTP__PORT: ${SMTP_PORT:-587}
      OPENPROJECT_SMTP__USER__NAME: ${SMTP_USER}
      OPENPROJECT_SMTP__PASSWORD: ${SMTP_PASSWORD}
      OPENPROJECT_SMTP__AUTHENTICATION: login
      OPENPROJECT_SMTP__ENABLE__STARTTLS__AUTO: "false"
      OPENPROJECT_SMTP__OPENSSL__VERIFY__MODE: "none"
      OPENPROJECT_MAIL__FROM: ${SMTP_FROM}
    volumes:
      - op-assets:/var/openproject/assets
    networks:
      - proxy
      - openproject-backend
    depends_on:
      openproject-db:
        condition: service_healthy
      openproject-cache:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health_checks/default || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 1024M
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.openproject.rule=Host(`${OP_HOSTNAME}`)"
      - "traefik.http.routers.openproject.entrypoints=websecure"
      - "traefik.http.routers.openproject.tls.certresolver=letsencrypt"
      - "traefik.http.services.openproject.loadbalancer.server.port=8080"
      - "traefik.http.routers.openproject.middlewares=op-headers,rate-limit"
      - "traefik.http.middlewares.op-headers.headers.customRequestHeaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.op-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.op-headers.headers.stsIncludeSubdomains=true"

  openproject-db:
    image: postgres:18.3-alpine
    container_name: openproject-db
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    environment:
      POSTGRES_DB: ${OP_DB_NAME:-openproject}
      POSTGRES_USER: ${OP_DB_USER:-openproject}
      POSTGRES_PASSWORD: ${OP_DB_PASSWORD:?OP_DB_PASSWORD muss gesetzt sein}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - op-pgdata:/var/lib/postgresql
    networks:
      - openproject-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${OP_DB_USER:-openproject} -d ${OP_DB_NAME:-openproject}"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 192M

  openproject-cache:
    image: memcached:1.6.41-alpine
    container_name: openproject-cache
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    command: memcached -m 128
    networks:
      - openproject-backend
    deploy:
      resources:
        limits:
          memory: 192M
        reservations:
          memory: 128M

  # =========================================================================
  # NEXTCLOUD
  # =========================================================================
  nextcloud:
    image: nextcloud:32.0.6-apache
    container_name: nextcloud
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_HOST: nextcloud-db
      POSTGRES_DB: ${NC_DB_NAME:-nextcloud}
      POSTGRES_USER: ${NC_DB_USER:-nextcloud}
      POSTGRES_PASSWORD: ${NC_DB_PASSWORD}
      NEXTCLOUD_ADMIN_USER: ${NC_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NC_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NC_HOSTNAME}
      TRUSTED_PROXIES: 172.16.0.0/12 10.0.0.0/8 192.168.0.0/16
      OVERWRITEPROTOCOL: https
      OVERWRITEHOST: ${NC_HOSTNAME}
      REDIS_HOST: nextcloud-redis
      REDIS_HOST_PASSWORD: ${NC_REDIS_PASSWORD}
      PHP_MEMORY_LIMIT: 1024M
      PHP_UPLOAD_LIMIT: 16G
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: tls
      SMTP_NAME: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      MAIL_FROM_ADDRESS: noreply
      MAIL_DOMAIN: ${SMTP_DOMAIN}
    volumes:
      - nc-html:/var/www/html
      - nc-data:/var/www/html/data
    networks:
      - proxy
      - nextcloud-backend
    depends_on:
      nextcloud-db:
        condition: service_healthy
      nextcloud-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/status.php | grep -q '\"installed\":true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 512M
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.nextcloud.rule=Host(`${NC_HOSTNAME}`)"
      - "traefik.http.routers.nextcloud.entrypoints=websecure"
      - "traefik.http.routers.nextcloud.tls.certresolver=letsencrypt"
      - "traefik.http.services.nextcloud.loadbalancer.server.port=80"
      - "traefik.http.routers.nextcloud.middlewares=nc-chain,rate-limit"
      - "traefik.http.middlewares.nc-redirectregex.redirectregex.permanent=true"
      - "traefik.http.middlewares.nc-redirectregex.redirectregex.regex=https://(.*)/.well-known/(?:card|cal)dav"
      - "traefik.http.middlewares.nc-redirectregex.redirectregex.replacement=https://$${1}/remote.php/dav"
      - "traefik.http.middlewares.nc-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.nc-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.nc-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.nc-headers.headers.customRequestHeaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.nc-chain.chain.middlewares=nc-redirectregex,nc-headers"

  nextcloud-db:
    image: postgres:18.3-alpine
    container_name: nextcloud-db
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    environment:
      POSTGRES_DB: ${NC_DB_NAME:-nextcloud}
      POSTGRES_USER: ${NC_DB_USER:-nextcloud}
      POSTGRES_PASSWORD: ${NC_DB_PASSWORD:?NC_DB_PASSWORD muss gesetzt sein}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - nc-pgdata:/var/lib/postgresql
    networks:
      - nextcloud-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NC_DB_USER:-nextcloud} -d ${NC_DB_NAME:-nextcloud}"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 192M

  nextcloud-redis:
    image: redis:7.4.8-alpine
    container_name: nextcloud-redis
    restart: unless-stopped
    user: redis
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command: redis-server --requirepass ${NC_REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - nextcloud-backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${NC_REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  nextcloud-cron:
    image: nextcloud:32.0.6-apache
    container_name: nextcloud-cron
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    entrypoint: /cron.sh
    volumes:
      - nc-html:/var/www/html
      - nc-data:/var/www/html/data
    networks:
      - nextcloud-backend
    depends_on:
      - nextcloud
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -q '[c]ron' || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M

  # =========================================================================
  # COLLABORA ONLINE
  # =========================================================================
  collabora:
    image: collabora/code:25.04.9.3.1
    container_name: collabora
    restart: unless-stopped
    # no-new-privileges incompatible: Collabora needs setuid for sandboxed child processes
    cap_add:
      - MKNOD
      - SYS_CHROOT
    environment:
      aliasgroup1: "https://${NC_HOSTNAME}:443"
      extra_params: "--o:ssl.enable=false --o:ssl.termination=true"
      username: ${COLLABORA_ADMIN_USER:-admin}
      password: ${COLLABORA_ADMIN_PASSWORD}
      dictionaries: "de_DE en_US"
    networks:
      - proxy
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 512M
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.collabora.rule=Host(`${COLLABORA_HOSTNAME}`)"
      - "traefik.http.routers.collabora.entrypoints=websecure"
      - "traefik.http.routers.collabora.tls.certresolver=letsencrypt"
      - "traefik.http.services.collabora.loadbalancer.server.port=9980"
      - "traefik.http.routers.collabora.middlewares=collabora-headers"
      - "traefik.http.middlewares.collabora-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.collabora-headers.headers.customRequestHeaders.X-Forwarded-Proto=https"

# =============================================================================
# NETZWERKE
# =============================================================================
networks:
  proxy:
    external: true
  socket-proxy:
    driver: bridge
    internal: true
  openproject-backend:
    external: true
  nextcloud-backend:
    external: true

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  op-assets:
  op-pgdata:
  nc-html:
  nc-data:
  nc-pgdata:
