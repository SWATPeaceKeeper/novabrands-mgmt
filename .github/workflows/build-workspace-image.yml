name: Build Workspace Image

on:
  push:
    branches: [main]
    paths:
      - "coder/images/claude-workspace/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: swatpeacekeeper/claude-workspace

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/share/powershell /usr/local/share/chromium \
            /usr/local/lib/heroku /usr/local/share/edge_driver \
            /usr/local/share/gecko_driver /usr/share/swift
          sudo docker image prune --all --force
          sudo apt-get clean
          df -h /
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and load into local Docker daemon for Trivy scan
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: coder/images/claude-workspace
          load: true
          tags: ${{ env.IMAGE_NAME }}:scan
          cache-from: type=gha

      - name: Trivy vulnerability scan
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v /tmp/trivy-cache:/root/.cache/trivy \
            aquasec/trivy:0.69.1 image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --scanners vuln \
            --format table \
            ${{ env.IMAGE_NAME }}:scan

      # Push only after scan passes
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: coder/images/claude-workspace
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
